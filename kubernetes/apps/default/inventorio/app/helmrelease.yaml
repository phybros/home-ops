---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app inventorio
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      inventorio:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/phybros/inventorio
              tag: v0.0.3-beta
            env:
              LISTEN_ADDR: ":8080"
              INVENTORIO_AUTH_MODE: proxy
              INVENTORIO_PROXY_AUTH_HEADER: cf-access-authenticated-user-email
              INVENTORIO_ALLOWED_EMAILS: "${SECRET_INVENTORIO_ALLOWLIST}"
              INVENTORIO_SESSION_SECRET: "${SECRET_INVENTORIO_SESSION_SECRET}"
              DB_HOST: inventorio-postgres-rw.default.svc.cluster.local
              DB_PORT: 5432
              DB_NAME: inventory
              DB_SSLMODE: disable
              DB_USER:
                valueFrom:
                  secretKeyRef:
                    name: inventorio-postgres-app
                    key: username
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: inventorio-postgres-app
                    key: password
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &port 8080
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
    service:
      app:
        controller: inventorio
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
